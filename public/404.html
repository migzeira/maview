<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Maview</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects all 404s back to index.html preserving the path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
